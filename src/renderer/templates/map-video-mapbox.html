<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Fade overlay for intro/outro ── */
    #fade-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; opacity: 0; z-index: 100; pointer-events: none;
      transition: none;
    }

    /* ── Cinematic vignette ── */
    .vignette {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 1;
      box-shadow: inset 0 0 120px 30px rgba(0,0,0,0.2);
    }

    /* ── Title overlay (intro) ── */
    #title-overlay {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 50; pointer-events: none;
      padding: 64px 44px 100px 44px;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.4) 45%,
        rgba(0,0,0,0.1) 78%, transparent 100%
      );
      color: #fff; opacity: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    #title-overlay .hero-title {
      font-size: 72px; font-weight: 800; letter-spacing: -2px; line-height: 1.08;
      text-shadow: 0 3px 24px rgba(0,0,0,0.5);
    }
    #title-overlay .hero-accent {
      width: 52px; height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0.15));
      margin: 18px 0 16px 0;
    }
    #title-overlay .hero-subtitle {
      font-size: 24px; font-weight: 500; opacity: 0.85;
      letter-spacing: 0.5px; line-height: 1.5;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    /* ── Live stats HUD (fly phase) ── */
    #stats-hud {
      position: absolute; bottom: 32px; left: 24px; right: 24px;
      z-index: 50; pointer-events: none; opacity: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    #stats-hud .hud-card {
      background: rgba(10,10,20,0.65);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 20px; padding: 20px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      display: flex; gap: 32px; align-items: center;
      color: #fff;
    }
    .hud-stat { flex: 1; text-align: center; }
    .hud-value {
      font-size: 28px; font-weight: 800; line-height: 1.1;
      letter-spacing: -0.5px;
    }
    .hud-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.2px; opacity: 0.4; margin-top: 4px;
    }
    .hud-divider {
      width: 1px; height: 36px;
      background: rgba(255,255,255,0.12);
    }

    /* ── Outro final stats ── */
    #outro-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50; pointer-events: none; opacity: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #fff;
    }
    #outro-overlay .outro-card {
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 28px; padding: 40px 48px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
      text-align: center;
    }
    .outro-title {
      font-size: 42px; font-weight: 800; letter-spacing: -1px;
      margin-bottom: 24px;
    }
    .outro-stats {
      display: flex; gap: 36px; justify-content: center;
    }
    .outro-stat-value {
      font-size: 32px; font-weight: 800; letter-spacing: -0.5px;
    }
    .outro-stat-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; opacity: 0.45; margin-top: 4px;
    }

    /* Progress bar */
    #progress-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; z-index: 60; pointer-events: none;
    }
    #progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
      transition: none;
    }

    /* ── Elevation profile tracker (horizontal, lower-center) ── */
    #elev-tracker {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 140px; width: 80%; height: 68px;
      z-index: 50; pointer-events: none; opacity: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    }
    #elev-profile-canvas {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%; display: block;
    }
    #elev-cursor-col {
      position: absolute; top: 0; bottom: 0;
      left: 0; width: 0; overflow: visible;
    }
    #elev-cursor-line {
      position: absolute; top: 0; bottom: 0; left: 0;
      width: 1.5px;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 0 6px rgba(255,255,255,0.35);
    }
    #elev-cursor-dot {
      position: absolute; left: -4.5px; top: 50%;
      width: 9px; height: 9px; margin-top: -4.5px;
      border-radius: 50%; background: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.2), 0 0 10px rgba(255,255,255,0.7);
    }
    #elev-cursor-badge {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      background: rgba(10,10,20,0.65);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      padding: 3px 9px; color: #fff;
      font-size: 11px; font-weight: 700;
      white-space: nowrap; letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="vignette"></div>
  <div id="fade-overlay"></div>

  <div id="title-overlay">
    <div class="hero-title" id="hero-title"></div>
    <div class="hero-accent"></div>
    <div class="hero-subtitle" id="hero-subtitle"></div>
  </div>

  <div id="stats-hud">
    <div class="hud-card">
      <div class="hud-stat">
        <div class="hud-value" id="hud-distance">0.0 km</div>
        <div class="hud-label">距离</div>
      </div>
      <div class="hud-divider"></div>
      <div class="hud-stat">
        <div class="hud-value" id="hud-elevation">0 m</div>
        <div class="hud-label">海拔</div>
      </div>
      <div class="hud-divider"></div>
      <div class="hud-stat">
        <div class="hud-value" id="hud-speed">0.0 km/h</div>
        <div class="hud-label">速度</div>
      </div>
    </div>
  </div>

  <div id="outro-overlay">
    <div class="outro-card">
      <div class="outro-title" id="outro-title"></div>
      <div class="outro-stats" id="outro-stats"></div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="elev-tracker">
    <canvas id="elev-profile-canvas"></canvas>
    <div id="elev-cursor-col">
      <div id="elev-cursor-line"></div>
      <div id="elev-cursor-dot"></div>
      <div id="elev-cursor-badge">0 m</div>
    </div>
  </div>

  <script>
    var _map, _allCoords, _trackColors, _config;
    var _elevTrackerData = null;

    function hexToRgba(hex, alpha) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function initElevTracker(config) {
      if (!config.overlay || !config.overlay.profile || config.overlay.profile.length < 2) return;
      var profile = config.overlay.profile;
      var canvas = document.getElementById('elev-profile-canvas');
      if (!canvas) return;

      var elevMin = Infinity, elevMax = -Infinity;
      profile.forEach(function(p) {
        if (p.elevation < elevMin) elevMin = p.elevation;
        if (p.elevation > elevMax) elevMax = p.elevation;
      });
      var elevRange = elevMax - elevMin || 1;
      if (elevRange < 5) return;

      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      var cssW = rect.width, cssH = rect.height;
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);

      var w = canvas.width, h = canvas.height;
      var ctx = canvas.getContext('2d');
      var padL = Math.round(8 * dpr), padR = Math.round(8 * dpr);
      var padT = Math.round(8 * dpr), padB = Math.round(10 * dpr);
      var cw = w - padL - padR, ch = h - padT - padB;

      function cpx(i)    { return padL + (i / (profile.length - 1)) * cw; }
      function cpy(elev) { return (h - padB) - ((elev - elevMin) / elevRange) * ch; }

      ctx.beginPath();
      ctx.moveTo(padL, h - padB);
      profile.forEach(function(p, i) { ctx.lineTo(cpx(i), cpy(p.elevation)); });
      ctx.lineTo(padL + cw, h - padB);
      ctx.closePath();
      ctx.fillStyle = 'rgba(190,200,220,0.35)';
      ctx.fill();

      ctx.beginPath();
      profile.forEach(function(p, i) { i === 0 ? ctx.moveTo(cpx(i), cpy(p.elevation)) : ctx.lineTo(cpx(i), cpy(p.elevation)); });
      ctx.strokeStyle = 'rgba(210,220,235,0.90)';
      ctx.lineWidth = 1.5 * dpr;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      _elevTrackerData = {
        elevMin: elevMin, elevMax: elevMax, elevRange: elevRange,
        cssPadL: padL / dpr, cssCw: cw / dpr,
        cssPadT: padT / dpr, cssPadB: padB / dpr,
        cssCh: ch / dpr, cssH: cssH,
      };
    }

    function updateElevTracker(progress, elevationM) {
      if (!_elevTrackerData) return;
      var d = _elevTrackerData;
      var cursorX = d.cssPadL + progress * d.cssCw;
      document.getElementById('elev-cursor-col').style.left = cursorX + 'px';
      var dotY = (d.cssH - d.cssPadB) - ((elevationM - d.elevMin) / d.elevRange) * d.cssCh;
      dotY = Math.max(d.cssPadT, Math.min(dotY, d.cssH - d.cssPadB));
      document.getElementById('elev-cursor-dot').style.top = dotY + 'px';
      document.getElementById('elev-cursor-badge').style.top = dotY + 'px';
      document.getElementById('elev-cursor-badge').textContent = Math.round(elevationM) + ' m';
    }

    /**
     * Initialize the video map using Mapbox GL JS.
     * config: same as MapRenderConfig + videoExtras
     */
    window.initVideoMap = function(config) {
      return new Promise(function(resolve, reject) {
        _config = config;
        _allCoords = config.allCoordinates || [];
        _trackColors = config.trackColors || [];

        // Set Mapbox access token
        mapboxgl.accessToken = config.mapboxToken || '';

        var map = new mapboxgl.Map({
          container: 'map',
          style: config.style,
          center: config.center,
          zoom: config.zoom,
          pitch: config.pitch || 0,
          bearing: config.bearing || 0,
          attributionControl: false,
          preserveDrawingBuffer: true,
          fadeDuration: 0,
          interactive: false,
        });

        map.on('error', function(e) { console.error('Map error:', e.error); });

        map.on('load', function() {
          // 3D Terrain — use Mapbox's native terrain DEM
          if (config.terrain) {
            map.addSource('mapbox-dem', {
              type: 'raster-dem',
              url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
              tileSize: 512,
              maxzoom: 14,
            });
            map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });
          }

          // Track source — initially empty, will be updated per frame
          map.addSource('track', {
            type: 'geojson',
            data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] }, properties: {} },
            lineMetrics: false,
          });

          // Track casing
          var trackWidth = config.trackLayer && config.trackLayer.paint ? (config.trackLayer.paint['line-width'] || 5) : 5;
          map.addLayer({
            id: 'track-casing', type: 'line', source: 'track',
            layout: { 'line-join': 'round', 'line-cap': 'round' },
            paint: { 'line-width': trackWidth + 5, 'line-color': 'rgba(0,0,0,0.45)', 'line-opacity': 0.7 },
          });

          // Track main
          map.addLayer({
            id: 'track', type: 'line', source: 'track',
            layout: { 'line-join': 'round', 'line-cap': 'round' },
            paint: { 'line-width': trackWidth, 'line-color': config.trackBaseColor || '#3b82f6', 'line-opacity': 0.9 },
          });

          // Current position dot
          map.addSource('current-pos', {
            type: 'geojson',
            data: { type: 'Feature', geometry: { type: 'Point', coordinates: [0, 0] }, properties: {} },
          });
          map.addLayer({
            id: 'current-pos-glow', type: 'circle', source: 'current-pos',
            paint: {
              'circle-radius': 12, 'circle-color': '#3b82f6',
              'circle-opacity': 0.3, 'circle-blur': 0.8,
            },
          });
          map.addLayer({
            id: 'current-pos-dot', type: 'circle', source: 'current-pos',
            paint: {
              'circle-radius': 6, 'circle-color': '#fff',
              'circle-stroke-color': '#3b82f6', 'circle-stroke-width': 3,
            },
          });

          // Set title
          if (config.overlay && config.overlay.title) {
            document.getElementById('hero-title').textContent = config.overlay.title;
            var subtitleParts = [];
            if (config.overlay.distance) subtitleParts.push(config.overlay.distance);
            if (config.overlay.elevation) subtitleParts.push('↗ ' + config.overlay.elevation);
            if (config.overlay.duration) subtitleParts.push(config.overlay.duration);
            document.getElementById('hero-subtitle').textContent = subtitleParts.join('  ·  ');

            document.getElementById('outro-title').textContent = config.overlay.title;
            var outroHtml = '';
            if (config.overlay.distance) outroHtml += '<div class="hud-stat"><div class="outro-stat-value">' + config.overlay.distance + '</div><div class="outro-stat-label">距离</div></div>';
            if (config.overlay.elevation) outroHtml += '<div class="hud-stat"><div class="outro-stat-value">' + config.overlay.elevation + '</div><div class="outro-stat-label">累计爬升</div></div>';
            if (config.overlay.duration) outroHtml += '<div class="hud-stat"><div class="outro-stat-value">' + config.overlay.duration + '</div><div class="outro-stat-label">用时</div></div>';
            document.getElementById('outro-stats').innerHTML = outroHtml;
          }

          initElevTracker(config);
          _map = map;

          // Fit bounds initially to ensure tiles load
          map.fitBounds(
            [[config.bounds[0], config.bounds[1]], [config.bounds[2], config.bounds[3]]],
            { padding: 60, duration: 0, maxZoom: 18 }
          );

          map.once('idle', function() {
            var waitMs = config.terrain ? 3000 : 600;
            setTimeout(function() { resolve(); }, waitMs);
          });
        });
      });
    };

    /**
     * Advance one frame. Called from Node.js for each frame.
     */
    window.advanceFrame = function(kf, frameIndex, totalFrames) {
      if (!_map) return;

      var globalT = frameIndex / Math.max(1, totalFrames - 1);

      // Update camera
      _map.jumpTo({
        center: kf.center,
        zoom: kf.zoom,
        bearing: kf.bearing,
        pitch: kf.pitch,
      });

      // Update track (progressive reveal)
      if (_allCoords.length > 0 && kf.progress > 0) {
        var idx = Math.floor(kf.progress * (_allCoords.length - 1));
        idx = Math.max(1, Math.min(idx, _allCoords.length));
        var partial = _allCoords.slice(0, idx + 1);
        _map.getSource('track').setData({
          type: 'Feature',
          geometry: { type: 'LineString', coordinates: partial },
          properties: {},
        });

        var lastCoord = partial[partial.length - 1];
        _map.getSource('current-pos').setData({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: lastCoord },
          properties: {},
        });
      }

      // Always update HUD values
      document.getElementById('hud-distance').textContent = kf.distanceKm.toFixed(1) + ' km';
      document.getElementById('hud-elevation').textContent = Math.round(kf.elevationM) + ' m';
      document.getElementById('hud-speed').textContent = kf.speedKmh.toFixed(1) + ' km/h';
      updateElevTracker(kf.progress, kf.elevationM);

      if (kf.phase === 'intro') {
        var introT = frameIndex / (totalFrames * 0.15);
        document.getElementById('title-overlay').style.opacity = Math.min(1, introT * 2);
        var hudAlpha = Math.min(1, Math.max(0, (introT - 0.5) * 4));
        document.getElementById('stats-hud').style.opacity = hudAlpha;
        document.getElementById('elev-tracker').style.opacity = hudAlpha;
        document.getElementById('outro-overlay').style.opacity = 0;
        document.getElementById('fade-overlay').style.opacity = Math.max(0, 1 - introT * 3);
      }
      else if (kf.phase === 'fly') {
        document.getElementById('title-overlay').style.opacity = 0.9;
        document.getElementById('stats-hud').style.opacity = 1;
        document.getElementById('elev-tracker').style.opacity = 1;
        document.getElementById('outro-overlay').style.opacity = 0;
        document.getElementById('fade-overlay').style.opacity = 0;
      }
      else if (kf.phase === 'outro') {
        var outroT = (frameIndex - totalFrames * 0.85) / (totalFrames * 0.15);
        document.getElementById('title-overlay').style.opacity = 0.9;
        var outroHudAlpha = Math.max(0.3, 1 - outroT * 0.7);
        document.getElementById('stats-hud').style.opacity = outroHudAlpha;
        document.getElementById('elev-tracker').style.opacity = outroHudAlpha;
        document.getElementById('outro-overlay').style.opacity = Math.min(1, outroT * 3);

        if (_allCoords.length > 0) {
          _map.getSource('track').setData({
            type: 'Feature',
            geometry: { type: 'LineString', coordinates: _allCoords },
            properties: {},
          });
        }
        _map.getSource('current-pos').setData({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [0, 0] },
          properties: {},
        });

        document.getElementById('fade-overlay').style.opacity = Math.max(0, (outroT - 0.7) / 0.3);
      }

      document.getElementById('progress-fill').style.width = (globalT * 100) + '%';
    };

    /**
     * Wait for map to finish rendering (all tiles loaded).
     */
    window.waitForStable = function(timeoutMs) {
      if (!_map) return Promise.resolve();
      timeoutMs = timeoutMs || 300;
      var hasTerrain = _config && _config.terrain;

      // Mapbox terrain is more stable than MapLibre's, but still needs settling
      if (!hasTerrain && _map.areTilesLoaded()) {
        return new Promise(function(resolve) {
          _map.triggerRepaint();
          _map.once('render', function() { resolve(); });
        });
      }

      return new Promise(function(resolve) {
        var done = false;
        function finish() {
          if (done) return;
          done = true;
          resolve();
        }
        var timer = setTimeout(finish, timeoutMs);
        _map.once('idle', function() {
          clearTimeout(timer);
          if (hasTerrain) {
            _map.triggerRepaint();
            _map.once('render', function() {
              _map.triggerRepaint();
              _map.once('render', finish);
            });
          } else {
            _map.triggerRepaint();
            _map.once('render', finish);
          }
        });
      });
    };
  </script>
</body>
</html>
